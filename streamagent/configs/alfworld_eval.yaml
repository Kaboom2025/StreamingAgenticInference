# ALFWorld evaluation configuration
# Adjust dataset.data_path to your local alfworld data directory.

dataset:
  data_path: /path/to/alfred/data
  eval_split: eval_out_of_distribution

eval:
  max_tokens: 4000
  task_types:
    - pick_and_place
    - look_at_obj
    - pick_heat_then_place
    - pick_cool_then_place
    - pick_two_obj
    - pick_clean_then_place

model:
  backend: llama
  model_id: qwen2.5-1.5b-instruct-q4_k_m.gguf
  temperature: 0.6
  top_k: 50
  top_p: 0.9

chunking_baseline:
  chunk_sizes: [8, 16, 32, 64]
